<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b1829 0%, #1a2a4a 100%);
            color: #e0e6ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px;
            backdrop-filter: blur(10px);
        }
        .logo {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }
        .logo-icon {
            height: 40px;
            width: auto;
        }
        .logo-text {
            text-align: left;
        }
        h1 { font-size: 24px; font-weight: 600; }
        .subtitle { color: #8899aa; font-size: 14px; margin-top: 4px; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 200, 83, 0.15);
            color: #00c853;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 32px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00c853;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .info-grid {
            display: grid;
            gap: 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .info-label {
            font-size: 13px;
            color: #8899aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #00aeef;
        }
        .links {
            margin-top: 32px;
            display: flex;
            gap: 16px;
        }
        .links a {
            color: #00aeef;
            text-decoration: none;
            font-size: 13px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 174, 239, 0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: rgba(0, 174, 239, 0.1);
            border-color: #00aeef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-text">
                <h1>{{ app_name }}</h1>
                <div class="subtitle">Deployed with Harness CI/CD</div>
            </div>
            <img class="logo-icon" src="/static/harness_logo_white.avif" alt="Harness">
        </div>

        <div class="status-badge">
            <div class="status-dot"></div>
            Running
        </div>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">Version</span>
                <span class="info-value">{{ version }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Environment</span>
                <span class="info-value">{{ environment }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Commit</span>
                <span class="info-value">{{ commit_sha[:8] if commit_sha != 'unknown' else 'unknown' }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Hostname</span>
                <span class="info-value">{{ hostname }}</span>
            </div>
        </div>

        <div class="links">
            <a href="/health">Health Check</a>
            <a href="/api/info">API Info</a>
            <a href="/docs">API Docs</a>
        </div>
    </div>
</body>
</html>
